<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#110a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="80" x2="900" y2="80" stroke="#1a1040" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#1a1040" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="#1a1040" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="320" stroke="#1a1040" stroke-width="0.5"/>
  <line x1="450" y1="0" x2="450" y2="320" stroke="#1a1040" stroke-width="0.5"/>
  <line x1="700" y1="0" x2="700" y2="320" stroke="#1a1040" stroke-width="0.5"/>

  <!-- Crypto chart line (right side) -->
  <polyline points="580,190 610,185 640,188 670,170 700,160 720,165 740,145 770,130 800,110 830,85 860,60"
            stroke="url(#chartLine)" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- Chart area fill -->
  <polygon points="580,190 610,185 640,188 670,170 700,160 720,165 740,145 770,130 800,110 830,85 860,60 860,200 580,200"
           fill="#7c3aed" opacity="0.04"/>

  <!-- Candlestick hints (crypto style) -->
  <rect x="600" y="180" width="4" height="12" rx="1" fill="#00ff88" opacity="0.3"/>
  <rect x="630" y="182" width="4" height="8" rx="1" fill="#ef4444" opacity="0.25"/>
  <rect x="665" y="165" width="4" height="14" rx="1" fill="#00ff88" opacity="0.3"/>
  <rect x="695" y="155" width="4" height="12" rx="1" fill="#00ff88" opacity="0.35"/>
  <rect x="735" y="138" width="4" height="16" rx="1" fill="#00ff88" opacity="0.35"/>
  <rect x="765" y="122" width="4" height="18" rx="1" fill="#00ff88" opacity="0.4"/>
  <rect x="795" y="102" width="4" height="20" rx="1" fill="#00d4ff" opacity="0.35"/>
  <rect x="825" y="78" width="4" height="16" rx="1" fill="#00d4ff" opacity="0.4"/>

  <!-- Bitcoin icon (small, right side) -->
  <circle cx="850" cy="48" r="14" fill="none" stroke="#f7931a" stroke-width="1.5" opacity="0.5"/>
  <text x="850" y="53" font-family="monospace" font-size="14" fill="#f7931a" text-anchor="middle" font-weight="bold" opacity="0.5">B</text>

  <!-- Ethereum icon (small, right side) -->
  <polygon points="810,38 800,48 810,54 820,48" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="40" y="40" width="140" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="40" y="108" font-family="monospace, 'Courier New'" font-size="66" font-weight="bold" fill="#7c3aed" letter-spacing="8" filter="url(#glow)">AI CRYPTO</text>

  <!-- Subtitle -->
  <text x="42" y="142" font-family="monospace, 'Courier New'" font-size="18" fill="#00d4ff" letter-spacing="3">ANALYST</text>

  <!-- Tagline -->
  <text x="42" y="174" font-family="monospace, 'Courier New'" font-size="14" fill="#78909c">AI-Powered Cryptocurrency Research &amp; Analysis Engine</text>

  <!-- Stat badges row -->
  <!-- Badge: 15 Skills -->
  <rect x="42" y="198" width="108" height="28" rx="6" fill="#0d0d24" stroke="#7c3aed" stroke-width="1"/>
  <text x="96" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#7c3aed" text-anchor="middle" font-weight="bold">15 Skills</text>

  <!-- Badge: 5 Agents -->
  <rect x="162" y="198" width="100" height="28" rx="6" fill="#0d0d24" stroke="#7c3aed" stroke-width="1"/>
  <text x="212" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#7c3aed" text-anchor="middle" font-weight="bold">5 Agents</text>

  <!-- Badge: On-Chain -->
  <rect x="274" y="198" width="100" height="28" rx="6" fill="#0d0d24" stroke="#00ff88" stroke-width="1"/>
  <text x="324" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="bold">On-Chain</text>

  <!-- Badge: DeFi -->
  <rect x="386" y="198" width="80" height="28" rx="6" fill="#0d0d24" stroke="#00d4ff" stroke-width="1"/>
  <text x="426" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#00d4ff" text-anchor="middle" font-weight="bold">DeFi</text>

  <!-- Badge: PDF Reports -->
  <rect x="478" y="198" width="120" height="28" rx="6" fill="#0d0d24" stroke="#f7931a" stroke-width="1"/>
  <text x="538" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#f7931a" text-anchor="middle" font-weight="bold">PDF Reports</text>

  <!-- Command previews -->
  <text x="42" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#7c3aed">/crypto analyze</tspan><tspan fill="#4A5568"> 5-agent research</tspan>
  </text>
  <text x="310" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#00ff88">/crypto onchain</tspan><tspan fill="#4A5568"> whale flows</tspan>
  </text>
  <text x="560" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#f7931a">/crypto report-pdf</tspan><tspan fill="#4A5568"> PDF report</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="296" width="900" height="24" rx="0" fill="#06061a"/>
  <text x="42" y="313" font-family="monospace, 'Courier New'" font-size="11" fill="#4A5568">
    on-chain + tokenomics + sentiment + technical + fundamental — full crypto analysis in one command
  </text>
</svg>
